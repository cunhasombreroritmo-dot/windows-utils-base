name: Repo Hygiene

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository baseline
        shell: pwsh
        run: |
          $required = @(
            'README.md',
            'LICENSE',
            'CONTRIBUTING.md',
            '.gitignore',
            '.editorconfig',
            '.gitattributes',
            '.github/CODEOWNERS',
            '.github/PULL_REQUEST_TEMPLATE.md',
            '.github/ISSUE_TEMPLATE/bug_report.md',
            '.github/ISSUE_TEMPLATE/feature_request.md'
          )

          $missing = $required | Where-Object { -not (Test-Path $_) }
          if ($missing.Count -gt 0) {
            throw "Missing required files: $($missing -join ', ')"
          }

          $legacyFiles = @(
            'capybara_clicker_bot.ahk',
            'qsetup.txt'
          )

          $presentLegacyFiles = $legacyFiles | Where-Object { Test-Path $_ }
          if ($presentLegacyFiles.Count -gt 0) {
            throw "Legacy files should stay out of the active repository: $($presentLegacyFiles -join ', ')"
          }
