name: PowerShell Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bootstrap developer modules
        shell: pwsh
        run: ./scripts/bootstrap-dev.ps1 -Scope CurrentUser

      - name: Lint
        shell: pwsh
        run: ./scripts/lint.ps1

      - name: Test
        shell: pwsh
        run: ./scripts/test.ps1
